name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check:
    # macOS so MLX (Apple-only) installs and the full server import can run.
    runs-on: macos-14
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync dependencies
        run: uv sync

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install jsdom (web smoke)
        run: npm i --no-save jsdom

      - name: Run checks
        run: ./scripts/check.sh
