<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Dog's Website</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #000;
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .container {
            width: 80%;
            max-width: 800px;
            margin: 20px 0;
        }
        h1, h2 {
            color: #ff6347;
        }
        .photo {
            width: 100%;
            height: auto;
            margin: 10px 0;
        }
        form {
            display: flex;
            flex-direction: column;
            width: 100%;
        }
        input, textarea, button {
            margin: 10px 0;
            padding: 10px;
            font-size: 16px;
        }
        button {
            background-color: #ff6347;
            color: #fff;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background-color: #ff4500;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to [Your Dog's Name]'s Website</h1>
        <p>[Your Dog's Name] is a [Breed] and loves to [Hobby/Activity].</p>
        <h2>Photos</h2>
        <img src="dog-photo.jpg" alt="[Your Dog's Name]" class="photo">
        <h2>Contact Me</h2>
        <form action="#">
            <label for="name">Name:</label>
            <input type="text" id="name" name="name" required>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email" required>
            <label for="message">Message:</label>
            <textarea id="message" name="message" rows="4" required></textarea>
            <button type="submit">Send</button>
        </form>
    </div>
</body>
</html>
