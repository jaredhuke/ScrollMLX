<svg width="48" height="48" viewBox="0 0 48 48" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Scroll">
  <title>Scroll</title>
  <g fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
    <!-- top roll -->
    <ellipse cx="24" cy="12" rx="8" ry="2.6"/>
    <!-- furled body -->
    <path d="M16 12v24"/>
    <path d="M32 12v24"/>
    <!-- bottom roll -->
    <ellipse cx="24" cy="36" rx="8" ry="2.6"/>
    <!-- vertical ribbon — long tails past both rolls -->
    <path d="M21.3 4v40"/>
    <path d="M26.7 4v40"/>
    <!-- teal wax seal -->
    <circle cx="24" cy="24" r="3" stroke="#2d8c8c"/>
  </g>
</svg>
