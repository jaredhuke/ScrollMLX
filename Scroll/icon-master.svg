<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <!-- ScrollMLX app icon — rounded glass squircle (transparent corners), a yin-yang nod
       in the S (one red dot in each lobe, clear of the stroke), dramatic depth & gloss -->
  <defs>
    <!-- luminous body: bright centre falling to deeper warm edges -->
    <radialGradient id="body" cx="0.42" cy="0.34" r="0.9">
      <stop offset="0" stop-color="#fbf8f2"/>
      <stop offset="0.5" stop-color="#efe8db"/>
      <stop offset="0.86" stop-color="#ddd3c1"/>
      <stop offset="1" stop-color="#cfc3ac"/>
    </radialGradient>
    <!-- yin-yang nod: a soft diagonal tonal split — cool upper-left lobe, warm lower-right -->
    <linearGradient id="yy" x1="0.12" y1="0.12" x2="0.88" y2="0.88">
      <stop offset="0" stop-color="#cdd6da" stop-opacity="0.5"/>
      <stop offset="0.46" stop-color="#cdd6da" stop-opacity="0"/>
      <stop offset="0.54" stop-color="#e9b98f" stop-opacity="0"/>
      <stop offset="1" stop-color="#d99a63" stop-opacity="0.38"/>
    </linearGradient>
    <radialGradient id="sheen" cx="0.5" cy="0.16" r="0.7">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.7"/>
      <stop offset="0.55" stop-color="#ffffff" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="vignette" cx="0.5" cy="0.5" r="0.72">
      <stop offset="0.7" stop-color="#3a2f20" stop-opacity="0"/>
      <stop offset="1" stop-color="#3a2f20" stop-opacity="0.26"/>
    </radialGradient>
    <radialGradient id="dot" cx="0.34" cy="0.3" r="0.85">
      <stop offset="0" stop-color="#f4a576"/>
      <stop offset="0.4" stop-color="#dd5f33"/>
      <stop offset="1" stop-color="#a8381a"/>
    </radialGradient>
    <filter id="sShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="9" stdDeviation="11" flood-color="#241c12" flood-opacity="0.34"/>
    </filter>
    <filter id="dotShadow" x="-90%" y="-90%" width="280%" height="280%">
      <feDropShadow dx="0" dy="4" stdDeviation="5" flood-color="#4d1a09" flood-opacity="0.42"/>
    </filter>
    <clipPath id="round"><rect x="0" y="0" width="1024" height="1024" rx="256"/></clipPath>
  </defs>

  <!-- glass body — everything clipped to the rounded squircle; corners stay transparent -->
  <g clip-path="url(#round)">
    <rect x="0" y="0" width="1024" height="1024" fill="url(#body)"/>
    <rect x="0" y="0" width="1024" height="1024" fill="url(#yy)"/>
    <rect x="0" y="0" width="1024" height="1024" fill="url(#sheen)"/>
    <rect x="0" y="0" width="1024" height="1024" fill="url(#vignette)"/>
  </g>
  <!-- crisp glass rim: bright top-left, soft dark bottom -->
  <rect x="3" y="3" width="1018" height="1018" rx="254" fill="none" stroke="#ffffff" stroke-opacity="0.55" stroke-width="2.5"/>
  <rect x="6" y="6" width="1012" height="1012" rx="251" fill="none" stroke="#5a4a32" stroke-opacity="0.16" stroke-width="2"/>

  <!-- mark (roundel + S + dots) scaled down around centre for more padding in the tile -->
  <g transform="translate(512,512) scale(0.82) translate(-512,-512)">
    <!-- circumscribing roundel — the S is enclosed in a circle -->
    <g filter="url(#dotShadow)"><circle cx="512" cy="512" r="226" fill="#f3eee6" fill-opacity="0.5"/></g>
    <circle cx="512" cy="512" r="226" fill="none" stroke="#1b1d23" stroke-width="10" stroke-opacity="0.92"/>
    <circle cx="512" cy="512" r="220.5" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-opacity="0.45"/>

    <!-- the embossed S, centred inside the ring -->
    <g transform="translate(152,174.5) scale(15)" stroke-linecap="round" stroke-linejoin="round">
      <g filter="url(#sShadow)">
        <path d="M31 13 C 31 8 17 8 17 15 C 17 21 31 22 31 30 C 31 37 17 37 17 32" fill="none" stroke="#1b1d23" stroke-width="3.7"/>
      </g>
      <path d="M31 13 C 31 8 17 8 17 15 C 17 21 31 22 31 30 C 31 37 17 37 17 32" fill="none" stroke="#41444d" stroke-width="1" stroke-opacity="0.6" transform="translate(0,-0.55)"/>
    </g>
    <!-- yin-yang eyes — one red dot in the open of each lobe, clear of the S stroke -->
    <g filter="url(#dotShadow)">
      <circle cx="468" cy="407" r="27" fill="url(#dot)"/>
      <circle cx="556" cy="618" r="27" fill="url(#dot)"/>
    </g>
    <circle cx="460" cy="399" r="8.5" fill="#ffffff" opacity="0.5"/>
    <circle cx="548" cy="610" r="8.5" fill="#ffffff" opacity="0.5"/>
  </g>
</svg>
