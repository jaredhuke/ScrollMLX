name: Scroll
options:
  bundleIdPrefix: com.scroll
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "16"

targets:
  Scroll:
    type: application
    platform: macOS
    sources:
      - path: Sources/Scroll
    resources:
      - Sources/Scroll/Resources/Colors.xcassets
      - Sources/Scroll/Resources/Assets.xcassets
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_BUNDLE_IDENTIFIER: com.scroll.Scroll
        MARKETING_VERSION: "1.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_VERSION: "5.10"
        MACOSX_DEPLOYMENT_TARGET: "14.0"
        ENABLE_HARDENED_RUNTIME: YES
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: ""
        INFOPLIST_KEY_NSHumanReadableCopyright: ""
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_NSPrincipalClass: NSApplication
        INFOPLIST_KEY_CFBundleDisplayName: Scroll
        # Non-sandboxed: needs to spawn uvicorn, read the project dir, and reach localhost.
        APP_SANDBOX_ENABLED: NO
        # Deep-context-engine permission strings (macOS shows these when access is requested)
        INFOPLIST_KEY_NSCalendarsFullAccessUsageDescription: "Scroll reads today's calendar to give the agent useful local context. Stays on your Mac."
        INFOPLIST_KEY_NSRemindersFullAccessUsageDescription: "Scroll reads your reminders to give the agent useful local context. Stays on your Mac."
        INFOPLIST_KEY_NSCalendarsUsageDescription: "Scroll reads today's calendar to give the agent useful local context."
        INFOPLIST_KEY_NSRemindersUsageDescription: "Scroll reads your reminders to give the agent useful local context."
        INFOPLIST_KEY_NSAppleEventsUsageDescription: "Scroll reads your current Finder selection to give the agent useful local context."
